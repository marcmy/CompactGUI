name: Apply compression stop compile fixes

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply compile fixes and restore normal workflow
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              p = Path(path)
              raw = p.read_bytes()
              bom = raw.startswith(b'\xef\xbb\xbf')
              text = raw.decode('utf-8-sig')
              if old not in text:
                  raise RuntimeError(f'Expected block not found in {path}')
              text = text.replace(old, new, 1)
              p.write_bytes((b'\xef\xbb\xbf' if bom else b'') + text.encode('utf-8'))

          folder_vm = 'CompactGUI/ViewModels/FolderViewModel.vb'
          replace(folder_vm,
                  '    <RelayCommand(CanExecute:=NameOf(CanControlCompression))>\n    Private Sub Pause()',
                  '    <RelayCommand>\n    Private Sub Pause()')
          replace(folder_vm,
                  '''    Private Function CanControlCompression() As Boolean
              Return Folder IsNot Nothing AndAlso (Folder.FolderActionState = ActionState.Working OrElse Folder.FolderActionState = ActionState.Paused)
          End Function

          <RelayCommand(CanExecute:=NameOf(CanControlCompression))>
          Private Async Function Cancel() As Task''',
                  '''    Private Function CanControlCompression() As Boolean
              Return Folder IsNot Nothing AndAlso (Folder.FolderActionState = ActionState.Working OrElse Folder.FolderActionState = ActionState.Paused)
          End Function

          Private Function CanPause() As Boolean
              Return CanControlCompression()
          End Function

          Private Function CanCancel() As Boolean
              Return CanControlCompression()
          End Function

          <RelayCommand>
          Private Async Function Cancel() As Task''')

          home_vm = 'CompactGUI/ViewModels/HomeViewModel.vb'
          replace(home_vm,
                  'Imports System.ComponentModel\n',
                  'Imports System.ComponentModel\nImports System.Runtime.ExceptionServices\n')
          replace(home_vm,
                  '''        Dim watcherTargetOverrides As New Dictionary(Of CompressableFolder, Core.WOFCompressionAlgorithm)()

          Try''',
                  '''        Dim watcherTargetOverrides As New Dictionary(Of CompressableFolder, Core.WOFCompressionAlgorithm)()
          Dim capturedException As Exception = Nothing

          Try''')
          replace(home_vm,
                  '''            Next
          Finally
              Compressing = False
              RemoveFolderCommand.NotifyCanExecuteChanged()
              Core.SharedMethods.RestoreSleep()
              Await _watcher.EnableBackgrounding()
          End Try
      End Function''',
                  '''            Next
          Catch ex As Exception
              capturedException = ex
          Finally
              Compressing = False
              RemoveFolderCommand.NotifyCanExecuteChanged()
              Core.SharedMethods.RestoreSleep()
          End Try

          Await _watcher.EnableBackgrounding()
          If capturedException IsNot Nothing Then
              ExceptionDispatchInfo.Capture(capturedException).Throw()
          End If
      End Function''')
          PY

          git fetch origin master --depth=1
          git checkout origin/master -- .github/workflows/build-release.yml
          rm -f .github/workflows/diagnose-stop-build.yml
          rm -f .github/workflows/fix-stop-build.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix compression stop command and cleanup flow"
          git push origin "HEAD:$HEAD_REF"
