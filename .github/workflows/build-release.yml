name: Apply zero-work compression fix

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - agent/compression-stop-options

permissions:
  contents: write

jobs:
  apply-fix:
    if: (github.event_name == 'push' && github.ref_name == 'agent/compression-stop-options') || (github.event_name == 'pull_request' && github.head_ref == 'agent/compression-stop-options' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Patch no-work completion and watcher cleanup
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              p = Path(path)
              raw = p.read_bytes()
              bom = raw.startswith(b'\xef\xbb\xbf')
              text = raw.decode('utf-8-sig')
              if old not in text:
                  raise RuntimeError(f'Expected block not found in {path}')
              text = text.replace(old, new, 1)
              p.write_bytes((b'\xef\xbb\xbf' if bom else b'') + text.encode('utf-8'))

          replace(
              'CompactGUI.Core/Compactor.cs',
              '''    public IReadOnlyDictionary<string, WOFCompressionAlgorithm> ProcessedFiles => processedFiles;

    public Compactor''',
              '''    public IReadOnlyDictionary<string, WOFCompressionAlgorithm> ProcessedFiles => processedFiles;
    public int WorkItemCount { get; private set; }

    public Compactor''')

          replace(
              'CompactGUI.Core/Compactor.cs',
              '''        var workingFiles = await BuildWorkingFilesList(filesList).ConfigureAwait(false);
        long totalFilesSize = workingFiles.Sum((f) => f.UncompressedSize);

        totalProcessedBytes = 0;
        processedFiles.Clear();

        var sw = Stopwatch.StartNew();''',
              '''        var workingFiles = (await BuildWorkingFilesList(filesList).ConfigureAwait(false)).ToList();
        WorkItemCount = workingFiles.Count;
        long totalFilesSize = workingFiles.Sum((f) => f.UncompressedSize);

        totalProcessedBytes = 0;
        processedFiles.Clear();

        if (WorkItemCount == 0)
        {
            progressMonitor?.Report(new CompressionProgress(100, string.Empty));
            CompactorLog.CompressionCompleted(_logger, 0);
            return true;
        }

        var sw = Stopwatch.StartNew();''')

          replace(
              'CompactGUI.Core/Compactor.cs',
              '''        progressMonitor?.Report(new CompressionProgress((int)((double)totalProcessedBytes / totalFilesSize * 100.0), file.FileName));''',
              '''        var progressPercent = totalFilesSize <= 0
            ? 100
            : (int)((double)totalProcessedBytes / totalFilesSize * 100.0);
        progressMonitor?.Report(new CompressionProgress(progressPercent, file.FileName));''')

          replace(
              'CompactGUI/Models/CompressionStopModels.vb',
              '''Public NotInheritable Class CompressionRunResult
    Public Property Completed As Boolean
    Public Property StopChoice As CompressionStopChoice?
End Class''',
              '''Public NotInheritable Class CompressionRunResult
    Public Property Completed As Boolean
    Public Property HadWork As Boolean
    Public Property StopChoice As CompressionStopChoice?
End Class''')

          replace(
              'CompactGUI/Services/CompressableFolderService.vb',
              '''            runResult.Completed = Await compressor.RunAsync(filesList, progress, GetThreadCount(folder))

            If isCompressing Then''',
              '''            runResult.Completed = Await compressor.RunAsync(filesList, progress, GetThreadCount(folder))
            runResult.HadWork = Not isCompressing OrElse Not TypeOf compressor Is Compactor OrElse DirectCast(compressor, Compactor).WorkItemCount > 0

            If isCompressing Then''')

          replace(
              'CompactGUI/Services/CompressableFolderService.vb',
              '''                folder.FolderActionState = ActionState.Results
                folder.IsFreshlyCompressed = runResult.Completed''',
              '''                folder.FolderActionState = ActionState.Results
                folder.IsFreshlyCompressed = runResult.Completed AndAlso runResult.HadWork''')

          replace(
              'CompactGUI/Services/CompressableFolderService.vb',
              '''        Dim retAnalysisResults = Await folder.Analyser.GetAnalysedFilesAsync(token)
        If cts.IsCancellationRequested Then
            folder.FolderActionState = ActionState.Idle
            Return 1
        End If

        folder.AnalysisResults = New ObservableCollection(Of AnalysedFileDetails)(retAnalysisResults)''',
              '''        Dim retAnalysisResults = Await folder.Analyser.GetAnalysedFilesAsync(token)
        If cts.IsCancellationRequested Then
            folder.FolderActionState = ActionState.Idle
            Return 1
        End If

        If retAnalysisResults Is Nothing Then
            If folder.AnalysisResults IsNot Nothing AndAlso folder.AnalysisResults.Count > 0 Then
                folder.FolderActionState = ActionState.Results
            Else
                folder.FolderActionState = ActionState.Idle
            End If
            Return -2
        End If

        folder.AnalysisResults = New ObservableCollection(Of AnalysedFileDetails)(retAnalysisResults)''')

          replace(
              'CompactGUI/ViewModels/HomeViewModel.vb',
              '''                                   Dim runResult = Await _compressableFolderService.CompressFolder(folder)
                                   Await _compressableFolderService.AnalyseFolderAsync(folder)

                                   If runResult.Completed AndAlso _settingsService.AppSettings.ShowNotifications Then
                                       Application.GetService(Of TrayNotifierService)().Notify_Compressed(folder.DisplayName, folder.UncompressedBytes - folder.CompressedBytes, folder.CompressionRatio)
                                   End If

                                   Dim watcherTarget = previousWatcherTarget
                                   If runResult.Completed OrElse (runResult.StopChoice.HasValue AndAlso runResult.StopChoice.Value = CompressionStopChoice.SaveProgress) Then
                                       watcherTarget = Core.WOFHelper.WOFConvertCompressionLevel(folder.CompressionOptions.SelectedCompressionMode)
                                   End If

                                   watcherTargetOverrides(folder) = watcherTarget
                                   Await _watcher.UpdateWatched(folder.FolderName, folder.Analyser, runResult.Completed, targetCompressionLevel:=watcherTarget)
                                   Return True''',
              '''                                   Dim runResult = Await _compressableFolderService.CompressFolder(folder)
                                   If runResult.HadWork Then
                                       Await _compressableFolderService.AnalyseFolderAsync(folder)
                                   End If

                                   If runResult.Completed AndAlso runResult.HadWork AndAlso _settingsService.AppSettings.ShowNotifications Then
                                       Application.GetService(Of TrayNotifierService)().Notify_Compressed(folder.DisplayName, folder.UncompressedBytes - folder.CompressedBytes, folder.CompressionRatio)
                                   End If

                                   Dim watcherTarget = previousWatcherTarget
                                   If runResult.Completed OrElse (runResult.StopChoice.HasValue AndAlso runResult.StopChoice.Value = CompressionStopChoice.SaveProgress) Then
                                       watcherTarget = Core.WOFHelper.WOFConvertCompressionLevel(folder.CompressionOptions.SelectedCompressionMode)
                                   End If

                                   watcherTargetOverrides(folder) = watcherTarget
                                   If runResult.HadWork Then
                                       Await _watcher.UpdateWatched(folder.FolderName, folder.Analyser, runResult.Completed, targetCompressionLevel:=watcherTarget)
                                   End If
                                   Return True''')

          replace(
              'CompactGUI/ViewModels/HomeViewModel.vb',
              '''        Await _watcher.EnableBackgrounding()
        If capturedException IsNot Nothing Then
            ExceptionDispatchInfo.Capture(capturedException).Throw()
        End If''',
              '''        Await _watcher.EnableBackgrounding()
        If capturedException IsNot Nothing Then
            _logger.LogError(capturedException, "Manual compression completion failed")
        End If''')

          replace(
              'CompactGUI.Watcher/Watcher.vb',
              '''        Else
            UpdateFolderProperties(existingItem, item)
        End If''',
              '''        Else
            UpdateFolderProperties(existingItem, item)
            If Not Object.ReferenceEquals(existingItem, item) Then item.Dispose()
        End If''')
          PY

          git fetch origin master --depth=1
          git checkout origin/master -- .github/workflows/build-release.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Handle already-compressed folders safely"
          git push origin "HEAD:$HEAD_REF"
