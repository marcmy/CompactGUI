name: Finish watcher compression target fix

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest

    steps:
      - name: Check out fix branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply remaining source changes and restore normal CI
        shell: pwsh
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          @'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              raw = file_path.read_bytes()
              has_bom = raw.startswith(b"\xef\xbb\xbf")
              text = raw.decode("utf-8-sig")
              newline = "\r\n" if "\r\n" in text else "\n"
              old_actual = old.replace("\n", newline)
              new_actual = new.replace("\n", newline)

              if old_actual not in text:
                  if new_actual in text:
                      return
                  raise RuntimeError(f"Expected source block not found in {path}: {old!r}")

              text = text.replace(old_actual, new_actual, 1)
              encoded = text.encode("utf-8")
              if has_bom:
                  encoded = b"\xef\xbb\xbf" + encoded
              file_path.write_bytes(encoded)

          replace_once(
              "CompactGUI.Watcher/Watcher.vb",
              "            If analysedFiles?.Count <> 0 Then\n"
              "                existingItem.CompressionLevel = analysedFiles.Select(Function(f) f.CompressionMode).Max\n"
              "            End If\n",
              "            If isFreshlyCompressed AndAlso targetCompressionLevel <> WOFCompressionAlgorithm.NO_COMPRESSION Then\n"
              "                existingItem.CompressionLevel = targetCompressionLevel\n"
              "            Else\n"
              "                existingItem.CompressionLevel = WOFHelper.GetDominantCompressionMode(analysedFiles)\n"
              "            End If\n"
          )

          replace_once(
              "CompactGUI.Watcher/Watcher.vb",
              "        End If\n"
              "    End Sub\n\n"
              "    Private Sub UpdateFolderProperties",
              "        End If\n"
              "    End Function\n\n"
              "    Private Sub UpdateFolderProperties"
          )

          replace_once(
              "CompactGUI.Watcher/Watcher.vb",
              "                If analysedFiles?.Count <> 0 Then\n"
              "                    Dim mainCompressionLVL = analysedFiles.Select(Function(f) f.CompressionMode).Max\n"
              "                    watched.CompressionLevel = If(mainCompressionLVL <> WOFCompressionAlgorithm.NO_COMPRESSION, mainCompressionLVL, watched.CompressionLevel)\n\n"
              "                    If checkDiskModified Then\n",
              "                If analysedFiles?.Count <> 0 Then\n"
              "                    If watched.CompressionLevel = WOFCompressionAlgorithm.NO_COMPRESSION Then\n"
              "                        watched.CompressionLevel = WOFHelper.GetDominantCompressionMode(analysedFiles)\n"
              "                    End If\n\n"
              "                    If checkDiskModified Then\n"
          )

          replace_once(
              "CompactGUI.Watcher/BackgroundCompactor.vb",
              "                            Dim analysed = Await analyser.GetAnalysedFilesAsync(cancellationTokenSource.Token)",
              "                            Await analyser.GetAnalysedFilesAsync(cancellationTokenSource.Token)"
          )

          replace_once(
              "CompactGUI.Watcher/BackgroundCompactor.vb",
              "                            If analysed IsNot Nothing AndAlso analysed.Count > 0 Then\n"
              "                                folder.CompressionLevel = analysed.Select(Function(f) f.CompressionMode).Max\n"
              "                            End If\n\n",
              ""
          )

          replace_once(
              "CompactGUI/ViewModels/HomeViewModel.vb",
              "                                   _watcher.UpdateWatched(folder.FolderName, folder.Analyser, True)",
              "                                   Dim targetCompressionLevel = Core.WOFHelper.WOFConvertCompressionLevel(folder.CompressionOptions.SelectedCompressionMode)\n"
              "                                   Await _watcher.UpdateWatched(folder.FolderName, folder.Analyser, ret, targetCompressionLevel:=targetCompressionLevel)"
          )

          replace_once(
              "CompactGUI/ViewModels/HomeViewModel.vb",
              "            AddOrUpdateFolderWatcher(folder)",
              "            Dim wasCompressedInCurrentBatch = foldersToCompress.Contains(folder) AndAlso folder.IsFreshlyCompressed\n"
              "            AddOrUpdateFolderWatcher(folder, wasCompressedInCurrentBatch)"
          )

          replace_once(
              "CompactGUI/ViewModels/HomeViewModel.vb",
              "    Public Sub AddOrUpdateFolderWatcher(folder As CompressableFolder)",
              "    Public Sub AddOrUpdateFolderWatcher(folder As CompressableFolder, wasCompressedInCurrentBatch As Boolean)"
          )

          replace_once(
              "CompactGUI/ViewModels/HomeViewModel.vb",
              "        newWatched.CompressionLevel = If(folder.AnalysisResults.Any(), folder.AnalysisResults.Max(Function(f) f.CompressionMode), Core.WOFCompressionAlgorithm.NO_COMPRESSION)",
              "        Dim existingWatched = _watcher.WatchedFolders.FirstOrDefault(Function(w) w.Folder = folder.FolderName)\n"
              "        If wasCompressedInCurrentBatch Then\n"
              "            newWatched.CompressionLevel = Core.WOFHelper.WOFConvertCompressionLevel(folder.CompressionOptions.SelectedCompressionMode)\n"
              "        ElseIf existingWatched IsNot Nothing Then\n"
              "            newWatched.CompressionLevel = existingWatched.CompressionLevel\n"
              "        Else\n"
              "            newWatched.CompressionLevel = Core.WOFHelper.GetDominantCompressionMode(folder.AnalysisResults)\n"
              "        End If"
          )

          replace_once(
              "CompactGUI/ViewModels/FolderViewModel.vb",
              "        _watcher.UpdateWatched(Folder.FolderName, Folder.Analyser, False)",
              "        Await _watcher.UpdateWatched(Folder.FolderName, Folder.Analyser, False)"
          )
          '@ | python -

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          git fetch origin master --depth=1
          git checkout origin/master -- .github/workflows/build-release.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CompactGUI.Watcher/Watcher.vb CompactGUI.Watcher/BackgroundCompactor.vb CompactGUI/ViewModels/HomeViewModel.vb CompactGUI/ViewModels/FolderViewModel.vb .github/workflows/build-release.yml

          if (git diff --cached --quiet) {
            Write-Host "No changes to commit."
            exit 0
          }

          git commit -m "Complete watcher compression target fix"
          git push origin "HEAD:$env:HEAD_REF"
