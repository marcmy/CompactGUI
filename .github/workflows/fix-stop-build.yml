name: Fix compression stop build

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/compression-stop-options' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Fix reserved enum name and clean diagnostics
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              p = Path(path)
              raw = p.read_bytes()
              bom = raw.startswith(b'\xef\xbb\xbf')
              text = raw.decode('utf-8-sig')
              if old not in text:
                  raise RuntimeError(f'Expected text not found in {path}: {old!r}')
              text = text.replace(old, new)
              p.write_bytes((b'\xef\xbb\xbf' if bom else b'') + text.encode('utf-8'))

          replace('CompactGUI/Models/CompressionStopModels.vb',
                  'Public Enum CompressionResumeChoice\n    Resume\n',
                  'Public Enum CompressionResumeChoice\n    ResumeProgress\n')

          for path in ('CompactGUI/Services/WindowService.vb', 'CompactGUI/ViewModels/HomeViewModel.vb'):
              replace(path, 'CompressionResumeChoice.Resume', 'CompressionResumeChoice.ResumeProgress')

          replace('CompactGUI/Models/CompressableFolders/CompressableFolder.vb',
                  '    Paused\n    Undoing\n    Waiting\n',
                  '    Paused\n    Waiting\n    Undoing\n')
          PY

          rm -f .github/workflows/diagnose-stop-build.yml
          rm -f .github/workflows/fix-stop-build.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix compression stop enum and clean diagnostics"
          git push origin "HEAD:$HEAD_REF"
