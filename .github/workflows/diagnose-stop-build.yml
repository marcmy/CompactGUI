name: Diagnose compression stop build

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/compression-stop-options'
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 9.0.x
      - name: Restore
        shell: pwsh
        run: dotnet restore CompactGUI/CompactGUI.vbproj
      - name: Capture strict publish output
        shell: pwsh
        continue-on-error: true
        run: |
          dotnet publish CompactGUI/CompactGUI.vbproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            --output "$env:RUNNER_TEMP/diagnostic-publish" `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:TreatWarningsAsErrors=true 2>&1 | Tee-Object "$env:RUNNER_TEMP/compression-stop-build.log"
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compression-stop-build-log
          path: ${{ runner.temp }}/compression-stop-build.log
          if-no-files-found: error
          retention-days: 1
