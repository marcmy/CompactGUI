name: Export source for compression stop work

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Upload source
        uses: actions/upload-artifact@v7
        with:
          name: CompactGUI-current-source
          path: |
            CompactGUI*/**
            !CompactGUI*/bin/**
            !CompactGUI*/obj/**
            *.sln
            *.md
          if-no-files-found: error
          retention-days: 1
