name: Temporary PR build

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore CompactGUI/CompactGUI.vbproj
      - name: Build
        run: dotnet build CompactGUI/CompactGUI.vbproj --configuration Release --no-restore
